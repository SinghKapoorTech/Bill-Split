name: Deploy Backend (Firebase)

# Deploys backend resources (Cloud Functions, Firestore rules/indexes, Storage
# rules) to production. Keeps prod in sync with `main`: it only fires when a
# backend file changes, and a build/typecheck must pass before anything deploys.
on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'shared/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # allow manual runs from the Actions tab

# Never run two backend deploys at once.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Lets you optionally require a manual approval before deploys run:
    # GitHub repo → Settings → Environments → "production" → required reviewers.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      # Gate: a non-compiling change must never reach prod. This compiles
      # functions/src AND ../shared (functions tsconfig includes it).
      - name: Build functions (typecheck gate)
        working-directory: functions
        run: npm run build

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT secret. Add a Firebase service-account JSON in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase
        run: >
          npx --yes firebase-tools@13 deploy
          --only functions,firestore,storage
          --project divit-6d217
          --non-interactive
          --force
