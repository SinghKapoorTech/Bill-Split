name: Deploy Backend (Firebase)

# Backend deploy pipeline (Cloud Functions, Firestore rules/indexes, Storage rules).
#   push to develop  ->  deploy to BETA  (divit-beta)
#   push to main     ->  deploy to PROD  (divit-6d217), behind the "production" approval gate
# Only fires when a backend file changes, and the functions build must pass first.
on:
  push:
    branches: [main, develop]
    paths:
      - 'functions/**'
      - 'shared/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # manual run from the Actions tab (deploys the branch it's run on)

# Don't run two deploys for the same branch at once.
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> production (add required reviewers to this Environment for an approval gate);
    # everything else -> beta.
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'beta' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      # Gate: a non-compiling change must never reach beta or prod.
      - name: Build functions (typecheck gate)
        working-directory: functions
        run: npm run build

      - name: Write service account credentials
        env:
          SA_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SA_BETA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BETA }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then SA="$SA_PROD"; else SA="$SA_BETA"; fi
          if [ -z "$SA" ]; then
            echo "::error::Missing service account secret for this branch. Add FIREBASE_SERVICE_ACCOUNT (prod) and FIREBASE_SERVICE_ACCOUNT_BETA (beta) in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then ALIAS=prod; else ALIAS=beta; fi
          echo "Deploying backend to '$ALIAS'..."
          npx --yes firebase-tools@13 deploy \
            --only functions,firestore,storage \
            --project "$ALIAS" \
            --non-interactive \
            --force
